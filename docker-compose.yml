# ------------------------------------------------------------------ #
#  docker-compose.yml — local development environment for star_bridge  #
#                                                                      #
#  `docker compose up` runs the bundled fake-agent DEMO (the image's   #
#  default command) and becomes healthy on :8080. To run a real ds4    #
#  agent, mount it and set `command:` — see the commented example.     #
# ------------------------------------------------------------------ #

services:
  star-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CODEX_PORT:-8080}:8080"
    environment:
      CODEX_PORT: 8080
    # Default (no command): the Dockerfile runs the bundled fake-agent demo.
    # For a real ds4 agent, mount it and override the command, e.g.:
    #   volumes:
    #     - /path/to/ds4-agent:/agent/ds4-agent
    #     - /path/to/workspace:/workspace
    #   command: ["/agent/ds4-agent", "/workspace", "-p", "8080", "--framed"]
    healthcheck:
      test: ["CMD", "bash", "scripts/healthcheck.sh"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

# Note: the runtime image ships the binary + wrapper only (not src/ or the full
# test tree), so the test suite is run from a source checkout with `make ci`,
# not from this image.
